name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ai-fifa/shared build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r build

  deploy-web:
    name: Deploy Web (Pages)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ai-fifa/shared build
      - run: pnpm --filter @ai-fifa/web build
      - name: Install Wrangler globally
        run: npm install -g wrangler@3
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: skip
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=aififa-web --commit-dirty=true

  deploy-api:
    name: Deploy API (Workers)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Wrangler globally
        run: npm install -g wrangler@3
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: skip
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply DB --remote
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: skip
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --env production
